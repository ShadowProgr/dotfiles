# Mac keys
bind=NONE,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 5 "backlight:apple-panel-bl"
bind=NONE,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 5 "backlight:apple-panel-bl"
bind=SUPER,XF86MonBrightnessDown,spawn,dms ipc call brightness decrement 5 "leds:kbd_backlight"
bind=SUPER,XF86MonBrightnessUp,spawn,dms ipc call brightness increment 5 "leds:kbd_backlight"
bind=NONE,XF86LaunchA,toggleoverview
bind=NONE,XF86Search,spawn,dms ipc call spotlight toggle
bind=NONE,XF86AudioMicMute,spawn,dms ipc call audio micmute

# Need to handle key ignore in /etc/systemd/logind.conf first
bind=NONE,XF86Sleep,spawn,dms ipc call notifications toggleDoNotDisturb
bind=NONE,XF86PowerOff,spawn,dms ipc call powermenu toggle

# Mac trackpad
tap_to_click=0
trackpad_natural_scrolling=1
click_method=2
accel_profile=2
disable_while_typing=1
