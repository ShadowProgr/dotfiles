# =========================================================
# APPLICATION LAUNCHERS
# =========================================================
bind=SUPER,Return,spawn,foot
bind=SUPER,d,spawn,dms ipc call spotlight toggle
bind=SUPER,e,spawn,foot yazi
#bind=SUPER,e,spawn,pcmanfm-qt
bind=SUPER,w,spawn,firefox
bind=SUPER,n,spawn,dms ipc call notepad toggle

bind=SUPER+SHIFT,s,spawn,dms screenshot --no-file --no-notify

# =========================================================
# SYSTEM & COMPOSITOR
# =========================================================
bind=SUPER,q,spawn,~/.config/mango/scripts/smart-close.sh
#bind=SUPER,q,killclient
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFT,r,reload_config

# =========================================================
# WINDOW FOCUS & MOVEMENT (Vim-style)
# =========================================================
# Make focused window master
bind=SUPER,m,zoom

# Switch focus
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Tab,focusstack,next
bind=SUPER,u,focuslast

# Swap Windows within the layout
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

# Move window (floating)
bind=SUPER+ALT,h,movewin,-50,+0
bind=SUPER+ALT,j,movewin,+0,+50
bind=SUPER+ALT,k,movewin,+0,-50
bind=SUPER+ALT,l,movewin,+50,+0
#bind=SUPER+ALT,h,smartmovewin,left
#bind=SUPER+ALT,j,smartmovewin,down
#bind=SUPER+ALT,k,smartmovewin,up
#bind=SUPER+ALT,l,smartmovewin,right

# Resize window
bind=SUPER+CTRL,h,resizewin,-50,+0
bind=SUPER+CTRL,j,resizewin,+0,+50
bind=SUPER+CTRL,k,resizewin,+0,-50
bind=SUPER+CTRL,l,resizewin,+50,+0

# =========================================================
# LAYOUTS & STATES
# =========================================================
bind=SUPER,space,switch_layout

bind=SUPER,f,togglefullscreen
bind=SUPER+SHIFT,f,togglefloating
bind=SUPER+CTRL,f,togglemaximizescreen
bind=SUPER+CTRL+SHIFT,f,togglefakefullscreen

bind=ALT,Tab,toggleoverview

bind=SUPER,o,toggleoverlay

# =========================================================
# TAGS / WORKSPACES
# =========================================================
# Switch to Tag
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Send active window to Tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0

# Toggle tags on active window
bind=SUPER+ALT,1,toggletag,1
bind=SUPER+ALT,2,toggletag,2
bind=SUPER+ALT,3,toggletag,3
bind=SUPER+ALT,4,toggletag,4
bind=SUPER+ALT,5,toggletag,5
bind=SUPER+ALT,6,toggletag,6
bind=SUPER+ALT,7,toggletag,7
bind=SUPER+ALT,8,toggletag,8
bind=SUPER+ALT,9,toggletag,9

# Toggle tag for viewing
bind=SUPER+CTRL,1,toggleview,1
bind=SUPER+CTRL,2,toggleview,2
bind=SUPER+CTRL,3,toggleview,3
bind=SUPER+CTRL,4,toggleview,4
bind=SUPER+CTRL,5,toggleview,5
bind=SUPER+CTRL,6,toggleview,6
bind=SUPER+CTRL,7,toggleview,7
bind=SUPER+CTRL,8,toggleview,8
bind=SUPER+CTRL,9,toggleview,9

# Multi-monitor
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
bind=SUPER+SHIFT,comma,tagmon,left,0
bind=SUPER+SHIFT,period,tagmon,right,0

# =========================================================
# MOUSE & TRACKPAD
# =========================================================
# Mouse binds
mousebind=SUPER,BTN_LEFT,moveresize,curmove
mousebind=SUPER,BTN_RIGHT,moveresize,curresize

# Gesture (trackpad) binds
# 3-finger swipe for focus & overview
gesturebind=NONE,left,3,focusdir,right
gesturebind=NONE,down,3,focusdir,up
gesturebind=NONE,up,3,focusdir,down
gesturebind=NONE,right,3,focusdir,left

# 4-finger swipe for tags
gesturebind=NONE,left,4,viewtoright_have_client,0
gesturebind=NONE,right,4,viewtoleft_have_client,0
gesturebind=NONE,up,4,toggleoverview

# =========================================================
# MISC
# =========================================================
bind=none,XF86AudioPrev,spawn,dms ipc call mpris prev
bind=none,XF86AudioNext,spawn,dms ipc call mpris next
bind=none,XF86AudioPlay,spawn,dms ipc call mpris playPause
bind=none,XF86AudioLowerVolume,spawn,dms ipc call audio decrement 5
bind=none,XF86AudioRaiseVolume,spawn,dms ipc call audio increment 5
bind=none,XF86AudioMute,spawn,dms ipc call audio mute
